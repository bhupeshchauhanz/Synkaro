version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: synkaro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synkaro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-synkaro_db}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - synkaro-pgdata:/var/lib/postgresql/data
    networks:
      - synkaro

  redis:
    image: redis:7-alpine
    container_name: synkaro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - synkaro-redis:/data
    networks:
      - synkaro

  livekit:
    image: livekit/livekit-server:latest
    container_name: synkaro-livekit
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_KEYS:-devkey: devkeysecret}"
    command: ["--bind", "0.0.0.0", "--node-ip", "${LIVEKIT_EXTERNAL_IP:-127.0.0.1}"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50000/udp"
    networks:
      - synkaro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synkaro-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-synkaro_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-synkaro_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      WEB_URL: ${WEB_URL:-https://synkaro.bhupeshchauhan.in}
      API_URL: ${API_URL:-https://synkaro.bhupeshchauhan.in/api}
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: synkaro.bhupeshchauhan.in
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devkeysecret}
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://synkaro.bhupeshchauhan.in/livekit}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      UPLOAD_DIR: /app/uploads
      CHAT_ENCRYPTION_KEY: ${CHAT_ENCRYPTION_KEY:-${JWT_SECRET}}
      NODE_ENV: production
    volumes:
      - synkaro-uploads:/app/uploads
    networks:
      - synkaro

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-https://synkaro.bhupeshchauhan.in/api}
        NEXT_PUBLIC_WS_URL: ${WS_URL:-wss://synkaro.bhupeshchauhan.in}
        NEXT_PUBLIC_LIVEKIT_URL: ${LIVEKIT_URL:-wss://synkaro.bhupeshchauhan.in/livekit}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: synkaro-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://synkaro.bhupeshchauhan.in/api}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-wss://synkaro.bhupeshchauhan.in}
      NEXT_PUBLIC_LIVEKIT_URL: ${LIVEKIT_URL:-wss://synkaro.bhupeshchauhan.in/livekit}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      NODE_ENV: production
    networks:
      - synkaro

  nginx:
    image: nginx:alpine
    container_name: synkaro-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - synkaro-uploads:/uploads:ro
    networks:
      - synkaro

volumes:
  synkaro-pgdata:
  synkaro-redis:
  synkaro-uploads:

networks:
  synkaro:
    driver: bridge
